# Muster Cloud Relay — nginx reverse proxy
#
# Replace relay.example.com with your domain.
# SSL certificates via certbot: certbot --nginx -d relay.example.com
#
# Usage:
#   cp relay.conf /etc/nginx/sites-available/muster-relay
#   ln -s /etc/nginx/sites-available/muster-relay /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx

upstream muster_relay {
    server 127.0.0.1:8443;
}

server {
    listen 80;
    server_name relay.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name relay.example.com;

    # Managed by certbot — update paths after running:
    #   certbot --nginx -d relay.example.com
    ssl_certificate     /etc/letsencrypt/live/relay.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/relay.example.com/privkey.pem;

    location / {
        proxy_pass http://muster_relay;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Preserve client info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long-lived WebSocket connections
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
